<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#111113"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WaveFM"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<!-- WaveFM v2.0.0 -->
<title>WaveFM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1db954;--f:'DM Sans',sans-serif}
[data-theme="dark"]{--bg:#111113;--s:#1c1c1e;--s2:#2c2c2e;--b:rgba(255,255,255,.08);--m:rgba(255,255,255,.38);--t:#f2f2f7;--card:rgba(255,255,255,.05);--inp:rgba(255,255,255,.09);--nav:#111113}
[data-theme="light"]{--bg:#f2f2f7;--s:#fff;--s2:#e5e5ea;--b:rgba(0,0,0,.09);--m:rgba(0,0,0,.4);--t:#1c1c1e;--card:rgba(0,0,0,.04);--inp:rgba(0,0,0,.07);--nav:#fff}
html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--t);overflow:hidden;transition:background .25s,color .25s}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg);transition:background .25s}
.scr{flex:1;overflow-y:auto;overflow-x:hidden}.scr::-webkit-scrollbar{display:none}
.ns{overflow-x:auto;white-space:nowrap}.ns::-webkit-scrollbar{display:none}
.pg{animation:pgIn .2s ease}.hidden{display:none!important}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ib{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:6px;color:inherit}.ib:active{opacity:.5}
.tr{display:flex;align-items:center;gap:12px;padding:9px 6px;border-radius:11px;cursor:pointer;transition:background .1s}.tr:active{background:var(--inp)}
.chip{padding:6px 14px;border-radius:40px;border:1px solid var(--b);background:transparent;color:var(--m);font-size:12px;font-family:var(--f);cursor:pointer;white-space:nowrap}
.chip:active{background:var(--inp)}
.sr{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--b);cursor:pointer}.sr:last-child{border-bottom:none}.sr:active{opacity:.7}
.sri{width:34px;height:34px;border-radius:9px;background:var(--inp);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--m)}
.badge{font-size:9px;font-weight:800;letter-spacing:1px;background:var(--g);color:#000;padding:2px 7px;border-radius:40px;text-transform:uppercase}
.wf{display:flex;align-items:center;gap:2px;height:14px}
.wb{width:2px;background:var(--g);border-radius:1px;animation:wfa .65s ease-in-out infinite}
.wb:nth-child(1){height:4px}.wb:nth-child(2){height:10px;animation-delay:.12s}.wb:nth-child(3){height:14px;animation-delay:.24s}.wb:nth-child(4){height:8px;animation-delay:.12s}.wb:nth-child(5){height:5px}
@keyframes wfa{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.dots{display:flex;gap:4px;padding:8px 12px;background:var(--inp);border-radius:12px;width:fit-content}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--m);display:inline-block;animation:dota .9s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dota{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
.sp{width:14px;height:14px;border:2px solid rgba(0,0,0,.15);border-top:2px solid #000;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:var(--b);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:#fff;border-radius:50%;cursor:pointer}
.pov{position:absolute;top:7px;right:7px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff}
/* Mini player */
#mp{padding:0 8px;flex-shrink:0}
.mi{background:var(--s);border-radius:13px;display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;box-shadow:0 -2px 20px rgba(0,0,0,.18)}
#mbar-wrap{height:2px;background:var(--b);border-radius:0 0 12px 12px;overflow:hidden}
#mbar{height:100%;background:var(--g);transition:width .5s linear;width:0%}
/* Ring */
.ring-wrap{position:relative;flex-shrink:0;width:44px;height:44px}
.ring-wrap img{width:44px;height:44px;border-radius:8px;object-fit:cover;display:block}
.ring-svg{position:absolute;top:-3px;left:-3px;width:50px;height:50px;pointer-events:none}
/* Nav */
#nav{background:var(--nav);border-top:1px solid var(--b);display:flex;justify-content:space-around;align-items:center;padding:8px 0 18px;flex-shrink:0;transition:background .25s}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--m);padding:4px 14px;font-family:var(--f);transition:color .15s}
.nb.on{color:var(--g)}.nb span{font-size:10px;font-weight:600}
/* Full player */
#fp{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);overflow:hidden}
#fp.open{transform:none}
#fp-blur{position:absolute;inset:-40px;background-size:cover;background-position:center;filter:blur(70px) saturate(2.2) brightness(.32);transition:opacity .4s;opacity:1;z-index:0}
#fp-grad{position:absolute;inset:0;z-index:1;opacity:.5;transition:background .4s}
#fp-content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;color:#fff}
#fp-art{width:100%;aspect-ratio:1;border-radius:14px;object-fit:cover;display:block;box-shadow:0 20px 60px rgba(0,0,0,.55);transition:transform .15s}
#fp-art.playing{transform:scale(1.01)}
/* Sheets */
.sh{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.sh.open{opacity:1;pointer-events:all}
.sh-bg{position:absolute;inset:0;background:rgba(0,0,0,.7)}
.sh-bd{position:relative;background:var(--s);border-radius:22px 22px 0 0;padding:20px 20px 36px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--b)}
.sh.open .sh-bd{transform:none}
.sh-bd::-webkit-scrollbar{display:none}
.drag{width:36px;height:4px;background:var(--b);border-radius:2px;margin:0 auto 18px}
/* Context menu */
#ctx{position:fixed;inset:0;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
#ctx.open{opacity:1;pointer-events:all}
#ctx-bg{position:absolute;inset:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(0,0,0,.5)}
#ctx-box{position:absolute;bottom:0;left:0;right:0;background:var(--s);border-radius:22px 22px 0 0;padding:16px 16px 32px;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#ctx.open #ctx-box{transform:none}
.cxi{display:flex;align-items:center;gap:14px;padding:11px 4px;cursor:pointer;border-radius:11px}.cxi:active{background:var(--inp)}
.cxic{width:36px;height:36px;border-radius:9px;background:var(--inp);display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* Queue sheet */
#queue-sh{position:fixed;inset:0;z-index:350;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
#queue-sh.open{opacity:1;pointer-events:all}
#queue-bg{position:absolute;inset:0;background:rgba(0,0,0,.7)}
#queue-bd{position:relative;background:var(--s);border-radius:22px 22px 0 0;max-height:75vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#queue-sh.open #queue-bd{transform:none}
/* Lyrics sheet */
/* lyrics CSS defined below */
/* EQ fullscreen */
#eq-fs{position:fixed;inset:0;z-index:600;background:var(--bg);transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#eq-fs.open{transform:none}
.eq-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.eq-track{flex:1;width:4px;background:var(--b);border-radius:2px;position:relative;cursor:ns-resize;min-height:80px}
.eq-fill{position:absolute;bottom:0;left:0;right:0;background:var(--g);border-radius:2px}
/* Album page */
#pg-album{height:100%;overflow:hidden;display:flex;flex-direction:column;padding:0}
#album-scr{flex:1;overflow-y:auto}.#album-scr::-webkit-scrollbar{display:none}
/* Artist profile */
.ap-stat{text-align:center;flex:1}
.ap-stat-val{font-size:20px;font-weight:900}
.ap-stat-lbl{font-size:10px;color:var(--m);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.ap-tag{display:inline-flex;background:rgba(29,185,84,.15);border:1px solid rgba(29,185,84,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--g);margin:2px}
/* Mode seg */
.mseg{display:flex;background:var(--inp);border-radius:12px;padding:3px;gap:2px}
.mseg-btn{flex:1;padding:7px 4px;border:none;border-radius:9px;font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--m);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.mseg-btn.on{background:var(--s);color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.15)}
/* Accent dots */
.adot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .12s}.adot:active{transform:scale(1.15)}.adot.on{border-color:var(--t)}
/* Toast */
#toast{position:fixed;bottom:150px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(24,24,26,.96);border:1px solid rgba(255,255,255,.1);border-radius:40px;padding:9px 18px;font-size:13px;font-weight:600;white-space:nowrap;z-index:9000;opacity:0;transition:all .22s;pointer-events:none;backdrop-filter:blur(20px);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Toggle SVG */
.tog{cursor:pointer;flex-shrink:0;display:flex}
/* BT pulse */
.bt-dot{width:6px;height:6px;border-radius:50%;background:#2563eb;animation:btpulse 2s ease-in-out infinite;display:inline-block}
@keyframes btpulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Legal */
.lh{font-size:15px;font-weight:800;color:var(--t);margin-bottom:8px;margin-top:20px}
.lp{font-size:13px;line-height:1.75;color:var(--m)}
.lul{padding-left:18px;margin-top:6px}
.lul li{font-size:13px;line-height:1.75;color:var(--m);margin-bottom:3px}
.lupd{text-align:center;font-size:11px;color:var(--m);padding:20px 0 8px;border-top:1px solid var(--b);margin-top:12px}
/* Footer */

/* ── Apple Music Full Player ── */
#fp{background:#000;overscroll-behavior:none;touch-action:pan-y}
#fp-blur{position:absolute;inset:-40px;background-size:cover;background-position:center;filter:blur(60px) saturate(2.5) brightness(.45);transition:opacity .4s;z-index:0}
#fp-grad{position:absolute;inset:0;z-index:1;background:rgba(0,0,0,.22)}
#fp-content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;color:#fff}
/* Big album art */
#fp-art-wrap{padding:0 28px;margin-bottom:16px}
#fp-art{width:100%;aspect-ratio:1;border-radius:12px;object-fit:cover;display:block;box-shadow:0 24px 60px rgba(0,0,0,.7);transition:transform .18s cubic-bezier(.4,0,.2,1)}
#fp-art.playing{transform:scale(1.02)}
/* Song info row */
#fp-info{display:flex;align-items:center;justify-content:space-between;padding:0 28px;margin-bottom:10px}
#fp-info-left{flex:1;min-width:0}
#fp-info-title{font-size:20px;font-weight:800;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
#fp-info-artist{font-size:14px;color:rgba(255,255,255,.65);margin-top:1px;cursor:pointer}
#fp-info-right{display:flex;gap:8px;flex-shrink:0}
/* Progress bar */
#fp-seek-wrap{padding:0 28px;margin-bottom:4px}
#fp-sk{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.3);border-radius:2px;outline:none;cursor:pointer}
#fp-sk::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#fff;border-radius:50%}
#fp-times{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.4);font-weight:500;padding:0 28px;margin-bottom:14px}
/* Controls */
#fp-ctrl{display:flex;align-items:center;justify-content:space-between;padding:0 28px;margin-bottom:14px}
/* Volume */
#fp-vol{display:flex;align-items:center;gap:8px;padding:0 28px;margin-bottom:18px}
#vol-sl{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.25);border-radius:2px;outline:none;cursor:pointer}
#vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border-radius:50%}
/* Bottom 3 icons */
#fp-bottom{display:flex;justify-content:space-around;align-items:center;padding:0 28px 36px}
/* ── Full-screen Lyrics — Apple Music style ── */
#lyr-sh{position:fixed;inset:0;z-index:500;pointer-events:none;transition:opacity .28s;opacity:0;overscroll-behavior:none}
#lyr-sh.open{opacity:1;pointer-events:all}
#lyr-blur-bg{position:absolute;inset:-50px;background-size:cover;background-position:center;filter:blur(80px) saturate(3) brightness(.28);z-index:0;transition:background-image .4s}
#lyr-bd{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;color:#fff;overscroll-behavior:contain}
#lyr-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#lyr-scroll::-webkit-scrollbar{display:none}
.lyr-line{transition:all .35s cubic-bezier(.4,0,.2,1)}
.lyr-line.active{font-size:28px!important;font-weight:900!important;color:#fff!important;opacity:1!important}
.lyr-line.past{opacity:.25!important}
.lyr-line.future{opacity:.3!important}
/* ── Queue ── */
#queue-sh{position:fixed;inset:0;z-index:350;opacity:0;pointer-events:none;transition:opacity .22s;overscroll-behavior:none}
#queue-sh.open{opacity:1;pointer-events:all}
#queue-bg{position:absolute;inset:-40px;background-size:cover;background-position:center;filter:blur(60px) saturate(2.5) brightness(.35);z-index:0}
#queue-bd{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;color:#fff}
/* ── Album page (Apple Music style) ── */
#pg-album{background:#000;color:#fff}
#album-scr{flex:1;overflow-y:auto;background:#000}.#album-scr::-webkit-scrollbar{display:none}
/* active lyric line pulse */
@keyframes lyric-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.pfoot{text-align:center;padding:20px 0 8px;color:var(--m);font-size:11px;line-height:1.8}
.pfoot strong{color:var(--g);font-weight:800}

/* ── Remove blue tap highlights — #1 web-app fix ── */
*{-webkit-tap-highlight-color:transparent;outline:none}
button,a,.clickable,.tr,.sr,.nb,.cxi,.sh-bd div[onclick],[onclick]{
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
}

/* ── Press effect — shrink 5% on tap ── */
.pressable{transition:transform .12s cubic-bezier(.4,0,.2,1),opacity .12s}
.pressable:active{transform:scale(.95)!important;opacity:.85}
.tr{transition:transform .12s cubic-bezier(.4,0,.2,1),background .1s}
.tr:active{transform:scale(.97);background:var(--inp)!important}
.nb{transition:color .15s,transform .1s}
.nb:active{transform:scale(.88)}

/* ── Play button glow ── */
#fp-pbtn{transition:transform .15s cubic-bezier(.4,0,.2,1),box-shadow .2s!important}
#fp-pbtn:active{transform:scale(.93)!important}
#fp-pbtn.playing-glow{box-shadow:0 0 0 8px rgba(255,255,255,.12),0 0 0 16px rgba(255,255,255,.06),0 4px 20px rgba(0,0,0,.4)!important}
#m-pbtn{transition:transform .12s,box-shadow .2s}
#m-pbtn:active{transform:scale(.88)!important}
#m-pbtn.playing-glow{box-shadow:0 0 0 6px rgba(29,185,84,.2),0 0 0 12px rgba(29,185,84,.08)!important}

/* ── Album art scale on play ── */
#fp-art{transition:transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .32s!important}
#fp-art.playing{transform:scale(1.04)!important;box-shadow:0 28px 70px rgba(0,0,0,.7)!important}

/* ── Page transitions — slide from right ── */
.pg{animation:none}
.pg.slide-in{animation:slideInRight .28s cubic-bezier(.4,0,.2,1) both}
.pg.slide-out{animation:slideOutLeft .22s cubic-bezier(.4,0,.2,1) both}
.pg.slide-in-back{animation:slideInLeft .28s cubic-bezier(.4,0,.2,1) both}
.pg.slide-out-back{animation:slideOutRight .22s cubic-bezier(.4,0,.2,1) both}
@keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes slideOutLeft{from{transform:none;opacity:1}to{transform:translateX(-40px);opacity:0}}
@keyframes slideInLeft{from{transform:translateX(-40px);opacity:0}to{transform:none;opacity:1}}
@keyframes slideOutRight{from{transform:none;opacity:1}to{transform:translateX(60px);opacity:0}}

/* ── Full player slide up/down ── */
#fp{transition:transform .36s cubic-bezier(.4,0,.2,1)!important}
#fp.open{transform:translateY(0)!important}

/* ── Skeleton loader ── */
.skel{background:linear-gradient(90deg,var(--inp) 25%,var(--s2) 50%,var(--inp) 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-circle{border-radius:50%}
.skel-text{border-radius:6px;height:12px}
.skel-sm{height:10px;border-radius:5px}

/* ── Sheet transitions ── */
.sh-bd{transition:transform .3s cubic-bezier(.4,0,.2,1)!important}
.sh.open .sh-bd{transform:none!important}

/* ── Mini player entrance ── */
#mp{animation:slideUp .4s cubic-bezier(.34,1.56,.64,1) both .2s}
@keyframes slideUp{from{transform:translateY(100px);opacity:0}to{transform:none;opacity:1}}

</style>
</head>
<body>
<div id="cfg-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:10000;background:#dc2626;color:#fff;font-size:12px;font-weight:700;padding:10px 16px;text-align:center"></div>

<!-- ═══════════════ SETUP SCREEN ═══════════════ -->
<div id="setup" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:52px 24px 48px">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:36px">

        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div style="font-size:28px;font-weight:900;letter-spacing:-.5px">WaveFM</div>

    </div>
    <!-- Deezer -->
    <div style="background:var(--card);border:1px solid var(--b);border-radius:16px;padding:15px;margin-bottom:12px;display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;background:rgba(162,56,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a238ff" stroke-width="1.9" stroke-linecap="round"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3z"/><path d="M3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
      </div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700">Deezer</div><div style="font-size:11px;color:var(--m);margin-top:1px">Music &amp; 30s previews &middot; No key needed</div></div>
      <div style="b
